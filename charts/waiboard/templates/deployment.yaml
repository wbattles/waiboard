apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "waiboard.fullname" . }}
  labels:
    {{- include "waiboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "waiboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "waiboard.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: waiboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_PATH
              {{- if .Values.persistence.enabled }}
              value: /data/waiboard.db
              {{- else }}
              value: /app/waiboard.db
              {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "waiboard.fullname" . }}
      {{- end }}
