<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>waiboard</title>
  <link rel="stylesheet" href="/style.css?v=3">
</head>
<body>

  <header>
    <div class="header-left">
      <button onclick="openModal()">new</button>
      <span class="app-name">waiboard</span>
      <select id="project-selector" onchange="switchProject()">
        <option value="">select project</option>
      </select>
    </div>
    <div class="header-actions">
      <button id="admin-btn" onclick="window.location.href='/admin'" class="hidden">admin</button>
      <button onclick="window.location.href='/settings'">settings</button>
      <button onclick="logout()">logout</button>
    </div>
  </header>

  <main>
    <div class="board">
      <div class="column">
        <h2>to do</h2>
        <div class="tickets" id="tickets-todo"></div>
      </div>
      <div class="column">
        <h2>in progress</h2>
        <div class="tickets" id="tickets-inprogress"></div>
      </div>
      <div class="column">
        <h2>testing</h2>
        <div class="tickets" id="tickets-testing"></div>
      </div>
      <div class="column">
        <h2>done</h2>
        <div class="tickets" id="tickets-done"></div>
      </div>
    </div>
  </main>

  <!-- view modal -->
  <div id="view-modal" class="modal hidden">
    <div class="modal-box">
      <div id="view-title" class="view-title"></div>
      <div id="view-desc" class="view-desc"></div>
      <select id="view-column"></select>
      <select id="ticket-assignee">
        <option value="0">unassigned</option>
      </select>
      <div class="modal-actions">
        <button onclick="openEditFromView()">edit</button>
        <button onclick="closeViewModal()">close</button>
      </div>
    </div>
  </div>

  <!-- create / edit modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h2 id="modal-heading">new</h2>
      <input type="text" id="ticket-title" placeholder="title" autocomplete="off" />
      <textarea id="ticket-description" placeholder="description"></textarea>
      <div class="modal-actions">
        <button onclick="submitTicket()">save</button>
        <button onclick="closeModal()">cancel</button>
        <button id="delete-btn" onclick="deleteTicket()" class="delete-btn hidden">delete</button>
      </div>
    </div>
  </div>

  <script src="/prefs.js"></script>
  <script src="/app.js"></script>
</body>
</html>
