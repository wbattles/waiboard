<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>waiboard - settings</title>
  <link rel="stylesheet" href="/style.css?v=4">
</head>
<body>

  <header>
    <div class="header-left">
      <span class="app-name">waiboard settings</span>
    </div>
    <div class="header-actions">
      <button onclick="window.location.href='/'">back to board</button>
      <button onclick="logout()">logout</button>
    </div>
  </header>

  <main class="admin-main">
    <nav class="admin-tabs">
      <button class="tab-btn active" onclick="showTab('settings')">settings</button>
      <button class="tab-btn" onclick="showTab('projects')">projects</button>
    </nav>

    <div class="tab-content">
      <!-- Settings Tab -->
      <section id="settings-tab" class="tab-panel active">
        <div class="users-layout">
          <div class="settings-left">
            <div class="create-user-panel">
              <h3>change password</h3>
              <form id="password-form">
                <input type="password" id="pw-current" placeholder="current password" required />
                <input type="password" id="pw-new" placeholder="new password" required />
                <button type="submit">save password</button>
              </form>
            </div>

            <div class="create-user-panel">
              <h3>display</h3>
              <div class="settings-row">
                <label>font</label>
                <select id="font-select" onchange="changeFont()">
                  <option value="system-ui, -apple-system, sans-serif">system (default)</option>
                  <option value="Georgia, serif">georgia</option>
                  <option value="Courier New, monospace">courier new</option>
                  <option value="Papyrus, fantasy">papyrus</option>
                  <option value="Comic Sans MS, Comic Sans, cursive">comic sans</option>
                  <option value="Zapfino, cursive">zapfino</option>
                </select>
              </div>
              <div class="settings-row">
                <label>mode</label>
                <select id="mode-select" onchange="changeMode()">
                  <option value="light">light</option>
                  <option value="dark">dark</option>
                </select>
              </div>
            </div>
          </div>

          <div class="user-list-panel">
            <h3>api keys</h3>
            <div id="api-keys-container"></div>
            <div class="api-keys-footer">
              <button onclick="generateApiKey()">generate new key</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Projects Tab -->
      <section id="projects-tab" class="tab-panel">
        <div class="users-layout">
          <div class="create-user-panel">
            <h3>create project</h3>
            <form id="create-project-form">
              <input type="text" id="new-project-name" placeholder="project name" maxlength="15" required />
              <input type="text" id="new-project-acronym" placeholder="project code" maxlength="3" required />
              <button type="submit">create project</button>
            </form>
          </div>

          <div class="user-list-panel">
            <h3>my projects</h3>
            <div id="my-projects-list"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- api key modal -->
  <div id="key-modal" class="modal hidden">
    <div class="modal-box">
      <h2>new api key</h2>
      <p>copy this key — it will not be shown again:</p>
      <input type="text" id="key-modal-value" readonly onclick="this.select()" />
      <div class="modal-actions">
        <button onclick="copyKey()">copy</button>
        <button onclick="closeKeyModal()">close</button>
      </div>
    </div>
  </div>

  <!-- confirmation modal -->
  <div id="confirm-modal" class="modal hidden">
    <div class="modal-box">
      <h2 id="confirm-title">confirm action</h2>
      <p id="confirm-message">are you sure?</p>
      <div class="modal-actions">
        <button id="confirm-ok" onclick="confirmAction()">confirm</button>
        <button onclick="closeConfirmModal()">cancel</button>
      </div>
    </div>
  </div>

  <!-- edit project modal -->
  <div id="project-modal" class="modal hidden">
    <div class="modal-box">
      <h2>edit users</h2>
      <div class="user-selection">
        <div id="project-users-list" class="user-checkbox-list">
        </div>
      </div>
      <div class="modal-actions">
        <button onclick="saveProjectUsers()">save</button>
        <button onclick="closeProjectModal()">cancel</button>
      </div>
    </div>
  </div>

  <script src="/prefs.js"></script>
  <script src="/settings.js"></script>
</body>
</html>
