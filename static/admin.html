<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>waiboard - admin</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <header>
    <div class="header-left">
      <span class="app-name">waiboard admin</span>
    </div>
    <div class="header-actions">
      <button onclick="window.location.href='/'">back to board</button>
      <button onclick="logout()">logout</button>
    </div>
  </header>

  <main class="admin-main">
    <nav class="admin-tabs">
      <button class="tab-btn active" onclick="showTab('users')">users</button>
      <button class="tab-btn" onclick="showTab('settings')">settings</button>
    </nav>

    <div class="tab-content">
      <!-- Users Tab -->
      <section id="users-tab" class="tab-panel active">
        <div class="users-layout">
          <div class="create-user-panel">
            <h3>create user</h3>
            <form id="create-user-form">
              <input type="text" id="new-username" placeholder="username" maxlength="30" required />
              <input type="password" id="new-password" placeholder="password" required />
              <label>
                <input type="checkbox" id="new-is-admin" />
                admin user
              </label>
              <button type="submit">create user</button>
            </form>
          </div>

          <div class="user-list-panel">
            <h3>users</h3>
            <div id="users-container"></div>
          </div>
        </div>
      </section>

      <!-- Settings Tab -->
      <section id="settings-tab" class="tab-panel">
        <div class="settings-section">
          <h3>system settings</h3>
          <p>more settings will be added here later</p>
        </div>
      </section>
    </div>
  </main>

  <!-- Password Change Modal -->
  <div id="password-modal" class="modal hidden">
    <div class="modal-box">
      <h2>change password</h2>
      <form id="password-form">
        <input type="password" id="new-user-password" placeholder="new password" required />
        <div class="modal-actions">
          <button type="submit">save</button>
          <button type="button" onclick="closePasswordModal()">cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Confirmation Modal -->
  <div id="confirm-modal" class="modal hidden">
    <div class="modal-box">
      <h2 id="confirm-title">confirm action</h2>
      <p id="confirm-message">are you sure?</p>
      <div class="modal-actions">
        <button id="confirm-ok" onclick="confirmAction()">confirm</button>
        <button onclick="closeConfirmModal()">cancel</button>
      </div>
    </div>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
